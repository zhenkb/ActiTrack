<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActiTrack - 運動紀錄</title>
    <link rel="stylesheet" href="actitrack-style.css">
    <style>
        /* 運動紀錄專屬排版 */
        .record-container {
            display: flex;
            flex-direction: column;
            gap: 20px;
            padding-bottom: 20px;
            overflow-y: auto;
            max-height: calc(100vh - 120px);
            padding-right: 10px;
        }
        
        .date-group { background: transparent; margin-bottom: 10px; }
        .date-title {
            font-size: calc(1.2vw + 10px); font-weight: bold; color: #2c3e50;
            border-bottom: 3px solid #bdc3c7; padding-bottom: 8px; margin-bottom: 15px;
            display: flex; align-items: center; gap: 10px;
        }
        .record-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 15px; }
        .record-card {
            background-color: #fdfdfd; border-radius: 8px; padding: 15px;
            border-left: 5px solid #3498db;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
            transition: transform 0.2s, box-shadow 0.2s;
            display: flex; flex-direction: column; gap: 10px;
        }
        .record-card:hover { transform: translateY(-3px); box-shadow: 0 6px 12px rgba(0,0,0,0.1); }
        .record-header {
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px dashed #ecf0f1; padding-bottom: 8px;
        }
        .time-badge { background-color: #eaf2f8; color: #2980b9; padding: 4px 10px; border-radius: 15px; font-size: 0.9em; font-weight: bold; }
        .ex-name { font-weight: bold; color: #2c3e50; font-size: 1.1em; }
        .record-body { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 5px; }
        .stat-item { background-color: #f8f9fa; padding: 8px; border-radius: 6px; display: flex; flex-direction: column; align-items: center; text-align: center; }
        .stat-label { font-size: 0.8em; color: #7f8c8d; margin-bottom: 4px; }
        .stat-val { font-weight: bold; color: #2c3e50; font-size: 1.1em; }
        .loading-text { font-size: 1.2em; color: #7f8c8d; text-align: center; padding: 20px; }

        /* 排序選單樣式 */
        .sort-select {
            padding: 8px 12px; font-size: 1rem; border-radius: 8px; 
            border: 2px solid #bdc3c7; background-color: #fdfdfd; 
            color: #2c3e50; font-weight: bold; cursor: pointer; outline: none;
            transition: border-color 0.2s;
        }
        .sort-select:hover, .sort-select:focus { border-color: #3498db; }
    </style>
</head>
<body>
    <button id="restore-btn" class="restore-btn" onclick="toggleSidebar()">☰</button>
    <div class="container" id="container">
        <div class="sidebar" id="sidebar">
            <div class="header">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div class="title" onclick="window.location.href='ActiTrack_Interface.html'" style="cursor: pointer;">ActiTrack運動辨識</div>
            </div>
            
            <div class="menu-section">
                <div class="menu-item" onclick="toggleSubmenu('submenu1')">
                    <span>運動紀錄新增</span>
                    <span class="dropdown-icon" id="icon1">▼</span>
                </div>
                <div class="submenu collapsed" id="submenu1"></div>
                
                <div class="menu-item" onclick="toggleSubmenu('submenu2')">
                    <span>記錄查詢</span>
                    <span class="dropdown-icon" id="icon2">▼</span>
                </div>
                <div class="submenu collapsed" id="submenu2">
                    <div class="submenu-item active" onclick="window.location.href='ActiTrack_Exercise_Record.html'">運動記錄</div>
                    <div class="submenu-item" onclick="window.location.href='ActiTrack_BMI_Record.html'">數值紀錄</div>
                </div>
            </div>
            
            <div class="user-section">
                <div class="user-info-container">
                      <div class="user-icon">
                        <img id="sidebar-user-avatar" src="" style="width:100%; height:100%; object-fit:cover; display:none;">
                        <svg id="sidebar-user-placeholder" class="avatar-placeholder" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                      </div>
                      <div class="user-name">user</div>
                </div>
                <div class="settings-icon" onclick="window.location.href='ActiTrack_Settings_Profile.html'">⚙</div>
            </div>
        </div>
        <div class="resizer" id="resizer"></div>

        <div class="main-content">
            <div style="display: flex; justify-content: space-between; align-items: center; padding: 2% 0; flex-wrap: wrap; gap: 10px;">
                <div style="font-size: calc(2vw + 10px); font-weight: bold; color: #333;">歷史運動記錄</div>
                <select id="sort-order" class="sort-select">
                    <option value="asc">🕒 時間：由舊到新</option>
                    <option value="desc" selected>🕒 時間：由新到舊 (預設)</option>
                </select>
            </div>

            <div id="records-container" class="record-container"></div>
            
        </div>
    </div>

    <script>
        function toggleSidebar() {
            const sidebar = document.getElementById('sidebar');
            const resizer = document.getElementById('resizer');
            const restoreBtn = document.getElementById('restore-btn');
            sidebar.classList.toggle('collapsed');
            if (sidebar.classList.contains('collapsed')) {
                resizer.style.display = 'none';
                restoreBtn.style.display = 'block';
            } else {
                sidebar.style.width = '22%';
                sidebar.style.flex = '0 0 22%';
                resizer.style.display = 'block';
                restoreBtn.style.display = 'none';
            }
        }
        
        function toggleSubmenu(id) { 
            const sm = document.getElementById(id); 
            const icon = document.getElementById(id === 'submenu1' ? 'icon1' : 'icon2'); 
            if(sm.style.display === 'none' || sm.style.display === '') { 
                sm.style.display = 'block'; 
                icon.classList.remove('rotated'); 
            } else { 
                sm.style.display = 'none'; 
                icon.classList.add('rotated'); 
            } 
        }

        const resizer = document.getElementById('resizer');
        const sidebar = document.getElementById('sidebar'); 
        let isResizing = false;
        
        resizer.addEventListener('mousedown', () => { isResizing = true; document.body.style.cursor = 'col-resize'; sidebar.style.transition = 'none'; resizer.classList.add('active'); });
        document.addEventListener('mousemove', (e) => { if(!isResizing) return; let p = (e.clientX / window.innerWidth) * 100; if(p < 10) p = 10; if(p > 50) p = 50; sidebar.style.flex = `0 0 ${p}%`; sidebar.style.width = `${p}%`; });
        document.addEventListener('mouseup', () => { if(!isResizing) return; isResizing = false; document.body.style.cursor = 'default'; sidebar.style.transition = 'all 0.4s cubic-bezier(0.4, 0, 0.2, 1)'; resizer.classList.remove('active'); });
        
        function startSpecificSport(modeName) {
            window.location.href = `ActiTrack_Detect.html?mode=${modeName}`;
        }
    </script>

    <script src="js/actitrack-api.js"></script>
    <script src="js/actitrack-ui.js"></script>
    <script src="JS/ActiTrack_User_Sync.js"></script>
    <script src="JS/ActiTrack_Exercise_Record.js?v=1"></script>
</body>
</html>
