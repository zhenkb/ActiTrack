<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ActiTrack運動辨識</title>
    <link rel="stylesheet" href="actitrack-style.css">
    <style>
        /* 修正無法下拉的問題：強制內容區塊可以垂直滾動 */
        .main-content { overflow-y: auto !important; padding-bottom: 40px; }
    </style>
</head>
<body>
    <button id="restore-btn" class="restore-btn" onclick="toggleSidebar()">☰</button>
    <div class="container" id="container">
        <div class="sidebar" id="sidebar">
            <div class="header">
                <button class="menu-toggle" onclick="toggleSidebar()">☰</button>
                <div class="title" onclick="window.location.href='ActiTrack_Interface.html'" style="cursor: pointer;">ActiTrack運動辨識</div>
            </div>
            
            <div class="menu-section">
                <div class="menu-item" onclick="toggleSubmenu('submenu1')">
                    <span>運動紀錄新增</span>
                    <span class="dropdown-icon" id="icon1">▼</span>
                </div>
                <div class="submenu collapsed" id="submenu1"></div>
                
                <div class="menu-item" onclick="toggleSubmenu('submenu2')">
                    <span>記錄查詢</span>
                    <span class="dropdown-icon" id="icon2">▼</span>
                </div>
                <div class="submenu collapsed" id="submenu2">
                    <div class="submenu-item" onclick="window.location.href='ActiTrack_Exercise_Record.html'">運動記錄</div>
                    <div class="submenu-item" onclick="window.location.href='ActiTrack_BMI_Record.html'">數值紀錄</div>
                </div>
            </div>
            
            <div class="user-section">
                <div class="user-info-container">
                      <div class="user-icon">
                        <img id="sidebar-user-avatar" src="" style="width:100%; height:100%; object-fit:cover; display:none;">
                        <svg id="sidebar-user-placeholder" class="avatar-placeholder" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.21 0 4-1.79 4-4s-1.79-4-4-4-4 1.79-4 4 1.79 4 4 4zm0 2c-2.67 0-8 1.34-8 4v2h16v-2c0-2.66-5.33-4-8-4z"/></svg>
                      </div>
                      <div class="user-name">user</div>
                </div>
                <div class="settings-icon" onclick="window.location.href='ActiTrack_Settings_Profile.html'">⚙</div>
            </div>
        </div>
        <div class="resizer" id="resizer"></div>

        <div class="main-content">
            <h1 class="content-header" style="font-size: calc(3vw + 24px); font-weight: bold; margin-bottom: 20px; color: #333;">Acti動覺</h1>
            
            <div id="dynamic-help-text" class="content-text" style="font-size: calc(1vw + 8px); line-height: 1.6;">
                載入介紹文字中...
            </div>
        </div>
    </div>

    <script src="js/actitrack-api.js"></script>
    <script src="js/actitrack-ui.js"></script>
    <script src="js/actitrack-interface.js"></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            ActiTrackUI.init();
        });
    </script>
</body>
<script src="js/ActiTrack_User_Sync.js"></script>

</html>
